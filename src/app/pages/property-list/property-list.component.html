<div class="container">
  <h2>Our Properties</h2>
  <div class="grid">
    <div *ngFor="let property of properties" class="card">
      <img [src]="property.imageUrl" alt="{{ property.title }}">
      <div class="card-content">
        <h3>{{ property.title }}</h3>
        <p class="location">{{ property.location }}</p>
        <p class="price">{{ property.price | currency }}</p>
        <a [routerLink]="['/properties', property.id]" class="btn-secondary">View Details</a>
      </div>
    </div>
  </div>
</div>
