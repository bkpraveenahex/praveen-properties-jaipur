<div *ngIf="property" class="detail-container">
  <img [src]="property.imageUrl" alt="{{ property.title }}">
  <div class="info">
    <h1>{{ property.title }}</h1>
    <p class="location">{{ property.location }}</p>
    <p class="price">{{ property.price | currency }}</p>
    <hr>
    <h3>Description</h3>
    <p class="desc">{{ property.description }}</p>
    <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I am interested in {{ property.title }} (ID: {{ property.id }})" 
       class="btn-whatsapp" target="_blank" rel="noopener noreferrer">
       Chat about this property
    </a>
  </div>
</div>
